# Nginx — skicoach.mmind.space → App auf Host-Port (127.0.0.1:HOST_APP_PORT, Default 3002)
#
# Für Hosts mit Nginx (z. B. 195.201.145.97 mit aiact/Forklore). Auf 49.13.139.206 stattdessen
# caddy-skicoach.caddyfile verwenden (n8n nutzt bereits Caddy auf 80/443).
#
# Auf dem Server (nach Certbot für diese Domain):
#   sudo cp nginx-skicoach.conf /etc/nginx/sites-available/skicoach
#   sudo ln -sf /etc/nginx/sites-available/skicoach /etc/nginx/sites-enabled/skicoach
#   sudo nginx -t && sudo nginx -s reload
#
# Vor Certbot: nur HTTP-Server mit proxy_pass, dann:
#   sudo certbot --nginx -d skicoach.mmind.space

server {
    listen 443 ssl;
    server_name skicoach.mmind.space;
    client_max_body_size 20m;

    ssl_certificate /etc/letsencrypt/live/skicoach.mmind.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/skicoach.mmind.space/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

server {
    listen 80;
    server_name skicoach.mmind.space;
    return 301 https://$host$request_uri;
}
